<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0A1929" />

  <!-- Primary SEO -->
  <title>Ernest Mutwiri — Performance Media Buyer | Google, Meta &amp; Bing Ads</title>
  <meta name="description" content="Performance Media Buyer with 3+ years scaling e-commerce brands across Google, Meta, and Bing Ads. $2M+ in tracked revenue generated." />
  <meta name="author" content="Ernest Mutwiri" />

  <!-- Open Graph / Social -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Ernest Mutwiri — Performance Media Buyer" />
  <meta property="og:description" content="3+ years scaling e-commerce brands across Google, Meta & Bing Ads. $2M+ in tracked revenue." />
  <meta property="og:image" content="assets/og-image.jpg" />
  <meta name="twitter:card" content="summary_large_image" />

  <!-- Favicon: simple EM monogram via inline SVG -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='12' fill='%230A1929'/><text x='50%25' y='54%25' text-anchor='middle' dominant-baseline='middle' font-family='Inter,Arial,sans-serif' font-size='28' font-weight='700' fill='%23F59E0B'>EM</text></svg>" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <a class="skip-link" href="#main">Skip to content</a>

  <!-- ==================== NAVIGATION ==================== -->
  <header class="nav" role="banner">
    <div class="container nav-inner">
      <a class="nav-brand" href="#top" aria-label="Home">
        <span data-content="nav.brand">Ernest Mutwiri</span><span class="dot">.</span>
      </a>

      <nav aria-label="Primary">
        <ul class="nav-links" data-content="nav.links"></ul>
      </nav>

      <a class="btn btn-primary nav-cta" href="#contact">Let's Talk</a>

      <button class="nav-toggle" aria-controls="mobile-menu" aria-expanded="false" aria-label="Open menu">
        <span></span><span></span><span></span>
      </button>
    </div>

    <div class="nav-mobile" id="mobile-menu">
      <ul data-content="nav.links"></ul>
      <a class="btn btn-primary" href="#contact">Let's Talk</a>
    </div>
  </header>

  <main id="main">

    <!-- ==================== HERO ==================== -->
    <section class="hero" id="top">
      <div class="container hero-inner">
        <div class="hero-text reveal">
          <span class="eyebrow" data-content="hero.eyebrow"></span>
          <h1 data-content="hero.heading"></h1>
          <p class="lede" data-content="hero.subheading"></p>
          <div class="hero-ctas">
            <a class="btn btn-primary"   data-content-href="hero.ctaPrimary.href"   data-content="hero.ctaPrimary.label"></a>
            <a class="btn btn-secondary" data-content-href="hero.ctaSecondary.href" data-content="hero.ctaSecondary.label"></a>
          </div>
        </div>
        <div class="hero-photo reveal" aria-hidden="false">
          <img data-content-src="hero.profileImage.src" data-content-alt="hero.profileImage.alt" alt="" />
        </div>
      </div>
    </section>

    <!-- ==================== METRICS BAR ==================== -->
    <section class="metrics" aria-label="Key results">
      <div class="container">
        <div class="metrics-grid reveal" data-content="metrics"></div>
      </div>
    </section>

    <!-- ==================== ABOUT ==================== -->
    <section class="about" id="about">
      <div class="container about-inner reveal">
        <div class="section-head" style="margin-bottom: 32px;">
          <span class="eyebrow">Background</span>
          <h2 data-content="about.heading"></h2>
        </div>
        <div data-content="about.paragraphs"></div>
      </div>
    </section>

    <!-- ==================== RESULTS / EXPERIENCE ==================== -->
    <section class="results" id="results">
      <div class="container">
        <div class="section-head reveal">
          <span class="eyebrow">Track Record</span>
          <h2 data-content="results.heading"></h2>
          <p class="subheading" data-content="results.subheading"></p>
        </div>
        <div class="results-grid reveal" data-content="results.cards"></div>
      </div>
    </section>

    <!-- ==================== SERVICES ==================== -->
    <section class="services" id="services">
      <div class="container">
        <div class="section-head reveal">
          <span class="eyebrow">Services</span>
          <h2 data-content="services.heading"></h2>
          <p class="subheading" data-content="services.subheading"></p>
        </div>
        <div class="services-grid reveal" data-content="services.items"></div>
      </div>
    </section>

    <!-- ==================== METHODOLOGY ==================== -->
    <section class="methodology">
      <div class="container">
        <div class="section-head reveal">
          <span class="eyebrow">Process</span>
          <h2 data-content="methodology.heading"></h2>
          <p class="subheading" data-content="methodology.subheading"></p>
        </div>
        <div class="steps reveal" data-content="methodology.steps"></div>
      </div>
    </section>

    <!-- ==================== PRODUCTS I'VE BUILT ==================== -->
    <section class="apps" id="apps">
      <div class="container">
        <div class="section-head reveal">
          <span class="eyebrow">Built by me</span>
          <h2 data-content="apps.heading"></h2>
          <p class="subheading" data-content="apps.subheading"></p>
        </div>
        <div class="apps-grid reveal" data-content="apps.items"></div>
      </div>
    </section>

    <!-- ==================== CERTIFICATIONS ==================== -->
    <section class="certifications" id="certifications">
      <div class="container">
        <div class="section-head reveal">
          <span class="eyebrow">Credentials</span>
          <h2 data-content="certifications.heading"></h2>
          <p class="subheading" data-content="certifications.subheading"></p>
        </div>
        <div class="certs-grid reveal" data-content="certifications.items"></div>
      </div>
    </section>

    <!-- ==================== TOOLS ==================== -->
    <section class="tools" aria-label="Tools and platforms">
      <div class="container">
        <div class="section-head reveal">
          <span class="eyebrow">Stack</span>
          <h2 data-content="tools.heading"></h2>
          <p class="subheading" data-content="tools.subheading"></p>
        </div>
        <div class="tools-marquee reveal">
          <div class="tools-track" data-content="tools.items"></div>
          <div class="tools-track" data-content="tools.items" aria-hidden="true"></div>
        </div>
      </div>
    </section>

    <!-- ==================== CONTACT ==================== -->
    <section class="contact" id="contact">
      <div class="container">
        <div class="section-head reveal">
          <span class="eyebrow">Get in touch</span>
          <h2 data-content="contact.heading"></h2>
          <p class="subheading" data-content="contact.subheading"></p>
        </div>

        <div class="contact-cards reveal">
          <a class="contact-card" data-content-href="contact.emailHref">
            <span class="contact-card__icon" aria-hidden="true">📧</span>
            <span class="contact-card__label">Email</span>
            <span class="contact-card__value" data-content="contact.email"></span>
          </a>
          <a class="contact-card" data-content-href="contact.phoneHref">
            <span class="contact-card__icon" aria-hidden="true">📱</span>
            <span class="contact-card__label">Phone</span>
            <span class="contact-card__value" data-content="contact.phone"></span>
          </a>
          <a class="contact-card" data-content-href="contact.linkedin" target="_blank" rel="noopener">
            <span class="contact-card__icon" aria-hidden="true">💼</span>
            <span class="contact-card__label">LinkedIn</span>
            <span class="contact-card__value">View profile</span>
          </a>
          <div class="contact-card contact-card--static">
            <span class="contact-card__icon" aria-hidden="true">📍</span>
            <span class="contact-card__label">Location</span>
            <span class="contact-card__value" data-content="contact.location"></span>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- ==================== FOOTER ==================== -->
  <footer class="footer">
    <div class="container">
      <p data-content="footer.copyright" style="margin:0;"></p>
      <p class="small" data-content="footer.note" style="margin:0;"></p>
    </div>
  </footer>

  <!-- ==================== STRUCTURED DATA (SEO) ==================== -->
  <script type="application/ld+json" id="ld-person"></script>

  <!-- ==================== CONTENT + RENDER ==================== -->
  <script src="content.js"></script>
  <script>
    /* -------------------------------------------------------------------------
       Tiny render layer — binds SITE_CONTENT (from content.js) into the DOM
       via data-content / data-content-href / data-content-src / data-content-alt
       attributes. Keeps content.js purely data; markup stays here.
       ------------------------------------------------------------------------- */
    (function () {
      const C = window.SITE_CONTENT;
      if (!C) { console.error("SITE_CONTENT missing — check content.js"); return; }

      // Sync <title> / meta with content.js so it's the single source of truth
      document.title = C.meta.title;
      setMeta("description", C.meta.description);
      setMetaProp("og:title",       C.meta.title);
      setMetaProp("og:description", C.meta.description);
      setMetaProp("og:image",       C.meta.ogImage);
      setMetaProp("og:url",         C.meta.siteUrl);

      // Convenience derived fields
      C.contact.emailHref = "mailto:" + C.contact.email;
      C.contact.phoneHref = "tel:" + C.contact.phone.replace(/\s+/g, "");

      // Resolve dotted-path lookups: "hero.ctaPrimary.label" -> C.hero.ctaPrimary.label
      const get = (path) => path.split(".").reduce((o, k) => (o == null ? o : o[k]), C);

      // Markdown-style bold: **text** -> <strong>text</strong>
      const fmt = (s) =>
        String(s).replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");

      // Renderers for collections we don't want to express as raw strings
      const RENDERERS = {
        "nav.links": (links) =>
          links.map(l => `<li><a href="${l.href}">${escape(l.label)}</a></li>`).join(""),

        "metrics": (items) =>
          items.map(m => `
            <div class="metric">
              <div class="value">${escape(m.value)}</div>
              <span class="label">${escape(m.label)}</span>
            </div>`).join(""),

        "about.paragraphs": (paras) =>
          paras.map(p => `<p>${fmt(escape(p))}</p>`).join(""),

        "results.cards": (cards) =>
          cards.map(c => `
            <article class="result-card">
              <header class="role-head">
                <div>
                  <span class="company">${escape(c.company)}</span>
                  <span class="role">${escape(c.role)}</span>
                </div>
                <span class="dates">${escape(c.dates)}</span>
              </header>
              <ul>
                ${c.achievements.map(a => `<li>${fmt(escape(a))}</li>`).join("")}
              </ul>
            </article>`).join(""),

        "services.items": (items) =>
          items.map(s => {
            const linkable = !!s.link;
            const open  = linkable
              ? `<a href="${escape(s.link)}" class="service-card service-card--link">`
              : `<article class="service-card">`;
            const close = linkable ? `</a>` : `</article>`;
            const cta   = linkable
              ? `<span class="service-link" aria-hidden="true">View case studies →</span>`
              : "";
            return `${open}
              <span class="icon" aria-hidden="true">${escape(s.icon)}</span>
              <h3>${escape(s.title)}</h3>
              <p>${escape(s.description)}</p>
              ${cta}
            ${close}`;
          }).join(""),

        "methodology.steps": (steps) =>
          steps.map(s => `
            <article class="step">
              <span class="num">${escape(s.number)}</span>
              <h3>${escape(s.title)}</h3>
              <p>${escape(s.description)}</p>
            </article>`).join(""),

        "certifications.items": (items) =>
          items.map(c => `
            <div class="cert">
              <span class="badge" aria-hidden="true">${initials(c.issuer)}</span>
              <div class="body">
                <strong>${escape(c.name)}</strong>
                <span>${escape(c.issuer)}</span>
              </div>
            </div>`).join(""),

        "tools.items": (items) =>
          items.map(t => `<span class="tool-chip">${escape(t)}</span>`).join(""),

        "apps.items": (items) =>
          items.map(a => `
            <article class="app-card">
              <a class="app-screenshot" href="${escape(a.url)}" target="_blank" rel="noopener" aria-label="Open ${escape(a.name)} live demo">
                <img src="${escape(a.screenshot)}" alt="${escape(a.name)} dashboard screenshot" loading="lazy" />
                <span class="app-screenshot__hint" aria-hidden="true">Open live →</span>
              </a>
              <div class="app-body">
                <header class="app-head">
                  <h3>${escape(a.name)}</h3>
                  <span class="app-tagline">${escape(a.tagline)}</span>
                </header>
                <p class="app-desc">${fmt(escape(a.description))}</p>
                <p class="app-audience"><strong>Built for:</strong> ${escape(a.audience)}</p>
                <ul class="app-features">
                  ${a.features.map(f => `<li>${fmt(escape(f))}</li>`).join("")}
                </ul>
                <a class="btn btn-primary app-cta" href="${escape(a.url)}" target="_blank" rel="noopener">${escape(a.ctaLabel)}</a>
              </div>
            </article>`).join(""),
      };

      // Bind all data-content placeholders
      document.querySelectorAll("[data-content]").forEach(el => {
        const path  = el.getAttribute("data-content");
        const value = get(path);
        if (value == null) return;

        if (RENDERERS[path]) {
          el.innerHTML = RENDERERS[path](value);
        } else if (Array.isArray(value)) {
          el.textContent = value.join(", ");
        } else {
          el.innerHTML = fmt(escape(value));
        }
      });

      document.querySelectorAll("[data-content-href]").forEach(el => {
        const v = get(el.getAttribute("data-content-href"));
        if (v != null) el.setAttribute("href", v);
      });
      document.querySelectorAll("[data-content-src]").forEach(el => {
        const v = get(el.getAttribute("data-content-src"));
        if (v != null) el.setAttribute("src", v);
      });
      document.querySelectorAll("[data-content-alt]").forEach(el => {
        const v = get(el.getAttribute("data-content-alt"));
        if (v != null) el.setAttribute("alt", v);
      });

      // JSON-LD structured data for SEO (Google rich results)
      const ld = {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": C.meta.author,
        "jobTitle": "Performance Media Buyer",
        "email": "mailto:" + C.contact.email,
        "telephone": C.contact.phone,
        "address": { "@type": "PostalAddress", "addressLocality": "Nairobi", "addressCountry": "KE" },
        "url": C.meta.siteUrl,
        "knowsAbout": ["Google Ads", "Meta Ads", "Bing Ads", "Performance Marketing", "E-commerce", "GA4", "Google Tag Manager"]
      };
      document.getElementById("ld-person").textContent = JSON.stringify(ld);

      /* ----- Mobile nav toggle ----- */
      const toggle = document.querySelector(".nav-toggle");
      const menu   = document.getElementById("mobile-menu");
      toggle.addEventListener("click", () => {
        const open = toggle.getAttribute("aria-expanded") === "true";
        toggle.setAttribute("aria-expanded", String(!open));
        toggle.setAttribute("aria-label", open ? "Open menu" : "Close menu");
        menu.classList.toggle("open", !open);
      });
      // Close on link tap (mobile)
      menu.addEventListener("click", (e) => {
        if (e.target.matches("a")) {
          toggle.setAttribute("aria-expanded", "false");
          menu.classList.remove("open");
        }
      });

      /* ----- Scroll reveal ----- */
      const io = new IntersectionObserver(entries => {
        entries.forEach(en => {
          if (en.isIntersecting) {
            en.target.classList.add("is-visible");
            io.unobserve(en.target);
          }
        });
      }, { threshold: 0.12 });
      document.querySelectorAll(".reveal").forEach(el => io.observe(el));

      /* ----- Helpers ----- */
      function escape(s) {
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }
      function initials(s) {
        return String(s).split(/\s+/).map(w => w[0]).join("").slice(0, 2).toUpperCase();
      }
      function setMeta(name, value) {
        let el = document.querySelector(`meta[name="${name}"]`);
        if (!el) { el = document.createElement("meta"); el.setAttribute("name", name); document.head.appendChild(el); }
        el.setAttribute("content", value);
      }
      function setMetaProp(prop, value) {
        let el = document.querySelector(`meta[property="${prop}"]`);
        if (!el) { el = document.createElement("meta"); el.setAttribute("property", prop); document.head.appendChild(el); }
        el.setAttribute("content", value);
      }
    })();
  </script>
</body>
</html>
