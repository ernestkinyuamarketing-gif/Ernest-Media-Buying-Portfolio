<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0A1929" />

  <title>Thanks for reaching out — Ernest Mutwiri</title>
  <meta name="description" content="Thanks for your message — Ernest will be in touch shortly." />
  <meta name="robots" content="noindex" />

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='12' fill='%230A1929'/><text x='50%25' y='54%25' text-anchor='middle' dominant-baseline='middle' font-family='Inter,Arial,sans-serif' font-size='28' font-weight='700' fill='%23F59E0B'>EM</text></svg>" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />

  <style>
    .ty-wrap {
      min-height: 80vh;
      display: flex; align-items: center; justify-content: center;
      padding: 80px 24px;
      background:
        radial-gradient(900px 500px at 50% -10%, rgba(245, 158, 11, 0.10), transparent 60%),
        var(--offwhite);
    }
    .ty-card {
      max-width: 560px;
      text-align: center;
      background: var(--white);
      border: 1px solid var(--grey-light);
      border-radius: var(--radius-lg);
      padding: 48px 36px;
      box-shadow: var(--shadow);
    }
    .ty-check {
      width: 72px; height: 72px;
      margin: 0 auto 20px;
      background: var(--gold);
      color: var(--navy);
      border-radius: 50%;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 2rem; font-weight: 700;
      box-shadow: 0 12px 28px rgba(245, 158, 11, 0.35);
    }
    .ty-card h1 { font-size: clamp(1.6rem, 3vw, 2.25rem); margin-bottom: 12px; }
    .ty-card p  { color: var(--grey); font-size: 1.05rem; margin-bottom: 28px; }
    .ty-card .btn { margin-top: 4px; }
  </style>
</head>
<body>

  <!-- ==================== NAVIGATION ==================== -->
  <header class="nav" role="banner">
    <div class="container nav-inner">
      <a class="nav-brand" href="index.html" aria-label="Home">
        <span>Ernest Mutwiri</span><span class="dot">.</span>
      </a>
      <a class="nav-back" href="index.html">← Back to portfolio</a>
    </div>
  </header>

  <main class="ty-wrap">
    <div class="ty-card">
      <div class="ty-check" aria-hidden="true">✓</div>
      <h1>Thanks — message received.</h1>
      <p>
        I read every message personally and will get back to you within
        <strong>24 hours</strong>. In the meantime, feel free to look around.
      </p>
      <a class="btn btn-primary" href="index.html">Back to portfolio</a>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <p style="margin:0;">© 2026 Ernest Mutwiri. All rights reserved.</p>
      <p class="small" style="margin:0;">Built with care in Nairobi, Kenya.</p>
    </div>
  </footer>
</body>
</html>
